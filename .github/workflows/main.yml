name: Run Outscraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: python outscraper_scraper.py

      - name: Upload output files
        uses: actions/upload-artifact@v4
        with:
          name: outscraper-results
          path: output/
          retention-days: 30
