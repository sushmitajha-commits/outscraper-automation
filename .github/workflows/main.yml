name: Run Outscraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'   # runs daily at 4AM UTC

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run script
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: python outscraper_scraper.py
